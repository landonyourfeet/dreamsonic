<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DreamSonic — Dashboard</title>
<style>
  :root {
    --bg:#0a0f1a;--panel:#0f1624;--panel-2:#121c2e;--border:#1d2a42;
    --text:#d8e3f3;--text-dim:#6a7a92;
    --cyan:#22d3ee;--green:#34d399;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;
    --mono:'SFMono-Regular','Consolas','Menlo',monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; }
  .topbar { background:var(--panel); border-bottom:1px solid var(--border);
            padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
  .brand { font-family:var(--mono); font-size:11px; letter-spacing:2px;
           color:var(--cyan); text-transform:uppercase; }
  .brand .sub { color:var(--text-dim); margin-left:8px; }
  .wrap { max-width:1400px; margin:0 auto; padding:24px; }
  .grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; margin-bottom:24px; }
  .stat { background:var(--panel); border:1px solid var(--border); padding:20px; }
  .stat .label { font-family:var(--mono); font-size:10px; letter-spacing:2px;
                 color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; }
  .stat .val { font-family:var(--mono); font-size:32px; font-weight:300; color:var(--text); }
  .stat .val.accent { color:var(--cyan); }
  .stat .val.pos { color:var(--green); }
  .stat .val.warn { color:var(--amber); }
  .stat .val.err { color:var(--red); }
  .row { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px; }
  .card { background:var(--panel); border:1px solid var(--border); }
  .card h2 { font-family:var(--mono); font-size:10px; letter-spacing:2px;
             color:var(--text-dim); text-transform:uppercase; padding:16px 20px;
             margin:0; border-bottom:1px solid var(--border);
             display:flex; justify-content:space-between; align-items:center; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:10px 20px; text-align:left; border-bottom:1px solid var(--border); }
  th { font-family:var(--mono); font-size:10px; letter-spacing:1.5px; color:var(--text-dim);
       text-transform:uppercase; font-weight:normal; }
  td { font-size:13px; }
  td .pill { font-family:var(--mono); font-size:10px; padding:2px 8px;
             border-radius:12px; letter-spacing:1px; }
  .pill.ok { background:rgba(52,211,153,0.15); color:var(--green); }
  .pill.warn { background:rgba(245,158,11,0.15); color:var(--amber); }
  .pill.err { background:rgba(239,68,68,0.15); color:var(--red); }
  .pill.idle { background:rgba(106,122,146,0.15); color:var(--text-dim); }
  .btn {
    padding:8px 16px; background:var(--panel-2); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:11px;
    letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border-radius:2px;
    text-decoration:none; display:inline-block;
  }
  .btn:hover { border-color:var(--cyan); color:var(--cyan); }
  .btn.primary { background:var(--cyan); color:#000; border-color:var(--cyan); font-weight:600; }
  .btn.small { padding:4px 10px; font-size:10px; }
  .empty { padding:30px; text-align:center; color:var(--text-dim); font-size:12px; }
  a { color:var(--cyan); text-decoration:none; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">DREAMSONIC <span class="sub">· COACH CONSOLE</span></div>
  <div style="display:flex;gap:10px;">
    <a class="btn primary" href="/intake">+ New Client</a>
    <a class="btn" href="/protocols">Protocols</a>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="statsGrid">
    <div class="stat"><div class="label">Active Clients</div><div class="val accent" id="sActive">—</div></div>
    <div class="stat"><div class="label">Ready to Book</div><div class="val pos" id="sReady">—</div></div>
    <div class="stat"><div class="label">Sessions 30d</div><div class="val accent" id="s30d">—</div></div>
    <div class="stat"><div class="label">Disqualified</div><div class="val warn" id="sDQ">—</div></div>
  </div>

  <div class="row">
    <div class="card">
      <h2>Clients <a class="btn primary small" href="/intake">+ New Client</a></h2>
      <table>
        <thead><tr>
          <th>Name</th><th>Status</th><th>Consent</th><th>Sessions</th><th>Last Session</th><th></th>
        </tr></thead>
        <tbody id="clientsBody"><tr><td colspan="6" class="empty">loading…</td></tr></tbody>
      </table>
    </div>
    <div class="card">
      <h2>Upcoming Sessions</h2>
      <div id="upcomingBody" class="empty">loading…</div>
    </div>
  </div>

  <div class="card">
    <h2>Recent Sessions</h2>
    <table>
      <thead><tr>
        <th>When</th><th>Client</th><th>Protocol</th><th>Status</th><th></th>
      </tr></thead>
      <tbody id="recentBody"><tr><td colspan="5" class="empty">loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
async function load() {
  try {
    const [stats, clients, recent] = await Promise.all([
      fetch('/api/admin/stats').then(r=>r.json()),
      fetch('/api/clients').then(r=>r.json()),
      fetch('/api/sessions?limit=20').then(r=>r.json()),
    ]);

    document.getElementById('sActive').textContent = stats.clients.active_clients;
    document.getElementById('sReady').textContent = stats.clients.ready_clients;
    document.getElementById('s30d').textContent = stats.sessions.completed_30d;
    document.getElementById('sDQ').textContent = stats.clients.disqualified;

    // Upcoming
    const up = stats.upcoming;
    if (!up.length) {
      document.getElementById('upcomingBody').innerHTML = '<div class="empty">No upcoming sessions.</div>';
    } else {
      document.getElementById('upcomingBody').innerHTML = up.map(u => `
        <div style="padding:10px 20px;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--mono);font-size:11px;color:var(--cyan);">
            ${new Date(u.scheduled_at).toLocaleString()}
          </div>
          <div style="margin-top:4px;">${u.first_name} ${u.last_name_initial}. — ${u.protocol_name}</div>
          <div style="margin-top:6px;"><a class="btn small" href="/session/${u.id}/run">Open Runner →</a></div>
        </div>
      `).join('');
    }

    // Clients
    if (!clients.clients.length) {
      document.getElementById('clientsBody').innerHTML = '<tr><td colspan="6" class="empty">No clients yet. Click + New Client.</td></tr>';
    } else {
      document.getElementById('clientsBody').innerHTML = clients.clients.map(c => {
        const statusCls = c.medical_clearance_status === 'cleared' ? 'ok'
          : c.medical_clearance_status === 'disqualified' ? 'err' : 'warn';
        const consentCls = c.consent_signed_at ? 'ok' : 'idle';
        const lastSession = c.last_session_at ? new Date(c.last_session_at).toLocaleDateString() : '—';
        return `<tr>
          <td><a href="/client/${c.id}">${c.first_name} ${c.last_name_initial}.</a></td>
          <td><span class="pill ${statusCls}">${c.medical_clearance_status}</span></td>
          <td><span class="pill ${consentCls}">${c.consent_signed_at ? 'signed' : 'missing'}</span></td>
          <td>${c.completed_sessions}</td>
          <td>${lastSession}</td>
          <td>
            <a class="btn small" href="/client/${c.id}">Open</a>
            ${c.medical_clearance_status === 'cleared' && c.consent_signed_at
              ? `<a class="btn small primary" href="/client/${c.id}?schedule=1">Schedule</a>` : ''}
          </td>
        </tr>`;
      }).join('');
    }

    // Recent
    if (!recent.sessions.length) {
      document.getElementById('recentBody').innerHTML = '<tr><td colspan="5" class="empty">No sessions yet.</td></tr>';
    } else {
      document.getElementById('recentBody').innerHTML = recent.sessions.map(s => {
        const when = s.started_at ? new Date(s.started_at).toLocaleString()
                   : s.scheduled_at ? new Date(s.scheduled_at).toLocaleString() + ' (scheduled)'
                   : '—';
        const cls = s.status === 'completed' ? 'ok'
                  : s.status === 'stopped_early' ? 'warn'
                  : s.status === 'cancelled' ? 'err' : 'idle';
        return `<tr>
          <td>${when}</td>
          <td>${s.first_name} ${s.last_name_initial}.</td>
          <td>${s.protocol_name}</td>
          <td><span class="pill ${cls}">${s.status}</span></td>
          <td><a class="btn small" href="/session/${s.id}/run">Open</a></td>
        </tr>`;
      }).join('');
    }
  } catch (err) {
    console.error(err);
    alert('Failed to load dashboard: ' + err.message);
  }
}
load();
</script>
</body>
</html>
